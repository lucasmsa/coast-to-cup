name: deploy site

# Deploys the web app to Cloudflare Pages on human pushes to main. Bot data
# refreshes deploy from inside refresh-data.yml instead (pushes made with the
# workflow token do not trigger this workflow).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        if: env.CF_TOKEN != ''

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
        if: env.CF_TOKEN != ''

      - name: Build and deploy
        if: env.CF_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build
          pnpm dlx wrangler pages deploy dist --project-name coast-to-cup --branch main